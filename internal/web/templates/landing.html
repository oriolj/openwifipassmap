<!DOCTYPE html>
<html lang="en" data-theme="emerald">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>OpenWifiPassMap — find public WiFi nearby</title>
  <meta name="description" content="A crowdsourced directory of public WiFi spots: cafés, libraries and venues with their network and password." />
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/daisyui@4/dist/full.min.css" rel="stylesheet" type="text/css" />
</head>
<body class="min-h-screen bg-base-200">
  <div class="navbar bg-base-100 shadow-sm">
    <div class="flex-1 px-4 text-xl font-bold">📶 OpenWifiPassMap</div>
  </div>

  <main class="max-w-2xl mx-auto p-4">
    <div class="hero bg-base-100 rounded-box mb-4">
      <div class="hero-content text-center">
        <div>
          <h1 class="text-2xl font-bold">Public WiFi near you</h1>
          <p class="py-2 opacity-70">Crowdsourced café &amp; venue WiFi, with passwords. Open and free.</p>
          <button id="find" class="btn btn-primary" data-testid="find-nearby">Find WiFi nearby</button>
          <p id="status" class="text-sm opacity-60 mt-2" data-testid="status"></p>
        </div>
      </div>
    </div>

    <ul id="results" class="space-y-2" data-testid="results"></ul>
  </main>

  <script>
    const statusEl = document.getElementById('status');
    const resultsEl = document.getElementById('results');

    // Build nodes with textContent (never innerHTML) so user-supplied spot
    // fields (venue_name, essid, notes) cannot inject HTML/script — these are
    // public, attacker-controllable values.
    function el(tag, className, text) {
      const node = document.createElement(tag);
      if (className) node.className = className;
      if (text != null) node.textContent = text;
      return node;
    }

    function renderSpot(s) {
      const li = el('li', 'card bg-base-100 shadow-sm');
      li.dataset.testid = 'spot';
      const body = el('div', 'card-body p-4');
      const row = el('div', 'flex justify-between items-start');

      const info = el('div');
      info.appendChild(el('h2', 'card-title text-base', s.venue_name || s.essid));
      info.appendChild(el('p', 'text-sm opacity-70', `${s.essid} · ${s.auth_type}`));

      const dist = el('span', 'badge badge-ghost', s.distance_km != null ? `${s.distance_km.toFixed(1)} km` : '');
      row.appendChild(info);
      row.appendChild(dist);

      const link = el('a', 'btn btn-sm btn-outline mt-2 w-fit', 'View & share');
      link.setAttribute('href', '/s/' + encodeURIComponent(s.id));

      body.appendChild(row);
      body.appendChild(link);
      li.appendChild(body);
      return li;
    }

    async function loadNearby(lat, lng) {
      statusEl.textContent = 'Loading…';
      resultsEl.replaceChildren();
      try {
        const res = await fetch(`/api/spots/nearby?lat=${lat}&lng=${lng}&radius_km=25`);
        if (!res.ok) throw new Error('server returned ' + res.status);
        const data = await res.json();
        if (!data.results || data.results.length === 0) {
          statusEl.textContent = 'No spots found nearby yet. Be the first to add one in the app!';
          return;
        }
        statusEl.textContent = `${data.count} spot(s) nearby`;
        for (const s of data.results) {
          resultsEl.appendChild(renderSpot(s));
        }
      } catch (err) {
        statusEl.textContent = 'Could not load spots: ' + (err && err.message ? err.message : 'unknown error');
      }
    }

    document.getElementById('find').addEventListener('click', () => {
      if (!navigator.geolocation) {
        statusEl.textContent = 'Geolocation not supported by this browser.';
        return;
      }
      statusEl.textContent = 'Locating…';
      navigator.geolocation.getCurrentPosition(
        (pos) => loadNearby(pos.coords.latitude, pos.coords.longitude),
        (err) => { statusEl.textContent = 'Location error: ' + err.message; }
      );
    });
  </script>
</body>
</html>
