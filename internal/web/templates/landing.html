<!DOCTYPE html>
<html lang="en" data-theme="emerald">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>OpenWifiPassMap — find public WiFi nearby</title>
  <meta name="description" content="A crowdsourced map of public WiFi spots: cafés, libraries and venues with their network and password." />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" crossorigin="" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" crossorigin="" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin="" defer></script>
  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js" crossorigin="" defer></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/daisyui@4/dist/full.min.css" rel="stylesheet" type="text/css" />
  <style>
    html, body { height: 100%; margin: 0; }
    #map { z-index: 0; }
  </style>
</head>
<body class="bg-base-200 flex flex-col h-screen">
  <header class="navbar min-h-12 bg-base-100 shadow-sm shrink-0 gap-2">
    <div class="flex-1 px-2 sm:px-3 text-sm sm:text-xl font-bold tracking-tight whitespace-nowrap overflow-hidden text-ellipsis">📶 OpenWifiPassMap</div>
    <button id="add-wifi" data-testid="add-wifi" class="btn btn-sm btn-primary shrink-0">➕ Add<span class="hidden sm:inline">&nbsp;WiFi</span></button>
    <div id="account" class="pr-2 shrink-0"></div>
  </header>

  <div class="flex-1 flex flex-col min-h-0">
    <!-- The map gets its own positioning context so overlays (pick bar,
         legend) are anchored to the MAP, never the list below it. -->
    <div class="relative flex-1 min-h-0">
      <div id="map" class="absolute inset-0"></div>

      <!-- Location-pick bar: shown while the user is placing a new spot's pin. -->
      <div id="pick-bar" data-testid="pick-bar"
           class="hidden absolute top-2 left-1/2 -translate-x-1/2 z-[1000] w-[92%] max-w-md
                  bg-base-100 shadow-lg rounded-box border p-2 flex items-center gap-2">
        <span class="text-sm flex-1">📍 Drag the pin to the venue, then continue.</span>
        <button id="pick-cancel" class="btn btn-ghost btn-xs">Cancel</button>
        <button id="pick-continue" data-testid="pick-continue" class="btn btn-primary btn-xs">Continue</button>
      </div>

      <!-- Quality legend: pin colour = community rating. Non-interactive so it
           never blocks map gestures; sits above Leaflet's attribution line. -->
      <div class="absolute bottom-7 left-2 z-[1000] pointer-events-none select-none
                  bg-base-100/90 rounded-full shadow px-2.5 py-1
                  flex items-center gap-x-2.5 text-[11px] leading-none whitespace-nowrap">
        <span class="flex items-center gap-1"><span style="color:#16a34a">●</span>Great</span>
        <span class="flex items-center gap-1"><span style="color:#f59e0b">●</span>Good</span>
        <span class="flex items-center gap-1"><span style="color:#dc2626">●</span>Basic</span>
        <span class="flex items-center gap-1"><span style="color:#9ca3af">●</span>Unrated</span>
      </div>
    </div>

    <aside class="bg-base-100 border-t shrink-0 max-h-[40vh] overflow-y-auto">
      <div class="flex flex-wrap items-center gap-x-3 gap-y-1 px-3 pt-2">
        <span id="status" data-testid="status" class="text-sm opacity-70 flex-1 basis-40">Loading…</span>
        <label class="flex items-center gap-1 text-xs">Quality
          <select id="filter-quality" data-testid="filter-quality" class="select select-bordered select-xs">
            <option value="0">All</option>
            <option value="1">★+</option>
            <option value="2">★★+</option>
            <option value="3">★★★</option>
          </select>
        </label>
        <label class="flex items-center gap-1 text-xs">Speed
          <select id="filter-speed" data-testid="filter-speed" class="select select-bordered select-xs">
            <option value="0">Any</option>
            <option value="25">25+ Mbps</option>
            <option value="100">100+ Mbps</option>
          </select>
        </label>
        <button id="locate" data-testid="find-nearby" class="btn btn-sm btn-primary">📍 Center on me</button>
      </div>
      <ul id="results" data-testid="results" class="grid gap-2 grid-cols-1 sm:grid-cols-2 p-3"></ul>
    </aside>
  </div>

  <!-- Auth modal: log in or register so the user can post spots. -->
  <dialog id="auth-modal" data-testid="auth-modal" class="modal">
    <div class="modal-box max-w-sm">
      <h3 class="font-bold text-lg">Log in</h3>
      <p class="text-sm opacity-70 mb-3">Log in or create an account to add WiFi spots.</p>
      <form id="auth-form" class="space-y-2">
        <input id="auth-username" data-testid="auth-username" name="username" autocomplete="username"
               class="input input-bordered w-full" placeholder="Username" />
        <input id="auth-email" data-testid="auth-email" name="email" type="email" autocomplete="email"
               class="input input-bordered w-full" placeholder="Email (required to sign up)" />
        <input id="auth-password" data-testid="auth-password" name="password" type="password"
               autocomplete="current-password" class="input input-bordered w-full" placeholder="Password" />
        <p id="auth-error" data-testid="auth-error" class="text-error text-sm hidden"></p>
        <button type="button" id="auth-forgot" data-testid="auth-forgot"
                class="btn btn-link btn-xs px-0 -mt-1">Forgot password?</button>
        <div class="modal-action">
          <button type="button" id="auth-cancel" class="btn btn-ghost btn-sm">Cancel</button>
          <button type="button" id="auth-register" data-testid="auth-register" class="btn btn-outline btn-sm">Register</button>
          <button type="submit" id="auth-login" data-testid="auth-login" class="btn btn-primary btn-sm">Log in</button>
        </div>
      </form>
    </div>
  </dialog>

  <!-- Add/edit-spot modal: opened after a location is picked (create) or from
       a card's Edit button (own spots; facts only, rating goes via reviews). -->
  <dialog id="add-modal" data-testid="add-modal" class="modal">
    <div class="modal-box max-w-sm">
      <h3 id="add-title" class="font-bold text-lg">Add a WiFi spot</h3>
      <p id="add-coords" data-testid="add-coords" class="text-xs opacity-70 mb-3"></p>
      <form id="add-form" class="space-y-2">
        <input id="add-venue" data-testid="add-venue" class="input input-bordered w-full" placeholder="Venue name (e.g. Café Luna)" />
        <input id="add-essid" data-testid="add-essid" class="input input-bordered w-full" placeholder="Network name (SSID) *" required />
        <select id="add-authtype" data-testid="add-authtype" class="select select-bordered w-full">
          <option value="wpa2" selected>WPA2</option>
          <option value="wpa3">WPA3</option>
          <option value="wep">WEP</option>
          <option value="open">Open (no password)</option>
        </select>
        <input id="add-password" data-testid="add-password" class="input input-bordered w-full" placeholder="Password" />
        <textarea id="add-notes" data-testid="add-notes" class="textarea textarea-bordered w-full" placeholder="Notes (optional)"></textarea>
        <div id="add-rating-fields" class="space-y-2">
          <select id="add-quality" data-testid="add-quality" class="select select-bordered w-full">
            <option value="0" selected>Quality rating: unrated</option>
            <option value="1">★ Basic</option>
            <option value="2">★★ Good</option>
            <option value="3">★★★ Great</option>
          </select>
          <div class="grid grid-cols-3 gap-2">
            <input id="add-down" data-testid="add-down" type="number" min="0" step="0.1"
                   class="input input-bordered w-full" placeholder="↓ Mbps" />
            <input id="add-up" data-testid="add-up" type="number" min="0" step="0.1"
                   class="input input-bordered w-full" placeholder="↑ Mbps" />
            <input id="add-ping" data-testid="add-ping" type="number" min="0" step="1"
                   class="input input-bordered w-full" placeholder="ping ms" />
          </div>
        </div>
        <p id="add-error" data-testid="add-error" class="text-error text-sm hidden"></p>
        <div class="modal-action">
          <button type="button" id="add-cancel" class="btn btn-ghost btn-sm">Cancel</button>
          <button type="submit" id="add-save" data-testid="add-save" class="btn btn-primary btn-sm">Save spot</button>
        </div>
      </form>
    </div>
  </dialog>

  <!-- Review modal: any logged-in user rates / speed-tests any spot. -->
  <dialog id="review-modal" data-testid="review-modal" class="modal">
    <div class="modal-box max-w-sm">
      <h3 class="font-bold text-lg">Rate this WiFi</h3>
      <p id="review-target" data-testid="review-target" class="text-xs opacity-70 mb-3"></p>
      <form id="review-form" class="space-y-2">
        <select id="review-quality" data-testid="review-quality" class="select select-bordered w-full">
          <option value="" selected>Quality: keep my current rating</option>
          <option value="1">★ Basic</option>
          <option value="2">★★ Good</option>
          <option value="3">★★★ Great</option>
        </select>
        <div class="grid grid-cols-3 gap-2">
          <input id="review-down" data-testid="review-down" type="number" min="0" step="0.1"
                 class="input input-bordered w-full" placeholder="↓ Mbps" />
          <input id="review-up" data-testid="review-up" type="number" min="0" step="0.1"
                 class="input input-bordered w-full" placeholder="↑ Mbps" />
          <input id="review-ping" data-testid="review-ping" type="number" min="0" step="1"
                 class="input input-bordered w-full" placeholder="ping ms" />
        </div>
        <p id="review-error" data-testid="review-error" class="text-error text-sm hidden"></p>
        <div class="modal-action">
          <button type="button" id="review-cancel" class="btn btn-ghost btn-sm">Cancel</button>
          <button type="submit" id="review-save" data-testid="review-save" class="btn btn-primary btn-sm">Save review</button>
        </div>
      </form>
    </div>
  </dialog>

  <div id="toast" class="toast toast-end z-[2000] hidden">
    <div id="toast-body" data-testid="toast" class="alert alert-success"></div>
  </div>

  <script>
  (function () {
    // Build nodes with textContent — spot fields are attacker-controllable.
    function el(tag, className, text) {
      const n = document.createElement(tag);
      if (className) n.className = className;
      if (text != null) n.textContent = text;
      return n;
    }

    // Hooks wired up once the map/account section initialises (DOMContentLoaded):
    // popupNode/listItem are defined up here but need the auth-aware actions.
    let onRate = null;   // (spot) => open the review modal
    let onEdit = null;   // (spot) => open the edit modal (own spots)
    let myUserId = null; // authed user's id, for the "is this my spot?" check

    function humanizeAgo(ms) {
      if (!ms) return '';
      const d = (Date.now() - ms) / 1000;
      if (d < 60) return 'just now';
      if (d < 3600) return Math.floor(d / 60) + ' min ago';
      if (d < 86400) return Math.floor(d / 3600) + ' h ago';
      if (d < 86400 * 30) return Math.floor(d / 86400) + ' days ago';
      return Math.floor(d / (86400 * 30)) + ' months ago';
    }

    function confirmationBadge(spot) {
      if (!spot.last_confirmed_at) return null;
      const text = '✓ Confirmed ' + humanizeAgo(spot.last_confirmed_at)
        + ' · ' + spot.confirmations_count
        + (spot.confirmations_count === 1 ? ' person' : ' people');
      const node = el('span',
        'badge badge-success badge-sm whitespace-normal text-xs leading-tight h-auto py-1',
        text);
      node.dataset.testid = 'confirmation-badge';
      return node;
    }

    // ---- Connection quality (manual 1-3 rating) + speed presentation ----
    // Palette is injected from Go (web.qualityColors) so the client pins and the
    // server-rendered share page never drift apart.
    const QUALITY_COLOR = {{qualityPaletteJS}};
    function qualityColor(q) { return QUALITY_COLOR[q] || QUALITY_COLOR[0]; }

    // Coloured star rating (★★☆); null for unrated so callers can skip it.
    function qualityNode(spot) {
      const q = spot.quality || 0;
      if (!q) return null;
      const n = el('span', 'text-xs font-semibold', '★'.repeat(q) + '☆'.repeat(3 - q));
      n.style.color = qualityColor(q);
      n.dataset.testid = 'spot-quality';
      return n;
    }

    // Speed summary like "120↓/20↑ Mbps · 18 ms" — only the parts present.
    function speedText(spot) {
      const parts = [];
      if (spot.down_mbps != null) parts.push(spot.down_mbps + '↓');
      if (spot.up_mbps != null) parts.push(spot.up_mbps + '↑');
      let t = parts.length ? parts.join('/') + ' Mbps' : '';
      if (spot.ping_ms != null) t += (t ? ' · ' : '') + spot.ping_ms + ' ms';
      return t;
    }
    function speedNode(spot) {
      const t = speedText(spot);
      if (!t) return null;
      const n = el('span', 'badge badge-ghost badge-sm text-xs', t);
      n.dataset.testid = 'spot-speed';
      return n;
    }

    function popupNode(spot) {
      const root = el('div', 'space-y-1');
      root.appendChild(el('strong', 'block', spot.venue_name || spot.essid));
      root.appendChild(el('div', 'text-xs opacity-70', spot.essid + ' · ' + spot.auth_type));
      const popQ = qualityNode(spot);
      if (popQ) root.appendChild(popQ);
      const popS = speedNode(spot);
      if (popS) root.appendChild(popS);
      const popupBadge = confirmationBadge(spot);
      if (popupBadge) root.appendChild(popupBadge);
      if (spot.password) {
        root.appendChild(el('code', 'font-mono block mt-1', spot.password));
      } else {
        root.appendChild(el('div', 'text-xs', 'Open network'));
      }
      if (spot.notes) root.appendChild(el('div', 'text-xs opacity-70', spot.notes));
      const row = el('div', 'flex gap-2 items-center mt-1');
      const link = el('a', 'btn btn-xs btn-link p-0', 'Open share page');
      link.setAttribute('href', '/s/' + encodeURIComponent(spot.id));
      row.appendChild(link);
      const rateBtn = el('button', 'btn btn-xs btn-outline btn-primary', '★ Rate');
      rateBtn.addEventListener('click', () => onRate && onRate(spot));
      row.appendChild(rateBtn);
      root.appendChild(row);
      return root;
    }

    function listItem(spot, map) {
      const li = el('li', 'card bg-base-200 shadow-sm cursor-pointer');
      li.dataset.testid = 'spot';
      const body = el('div', 'card-body p-3 gap-1');
      const head = el('div', 'flex justify-between items-start gap-2');
      const info = el('div');
      info.appendChild(el('h3', 'font-semibold text-sm', spot.venue_name || spot.essid));
      info.appendChild(el('p', 'text-xs opacity-70', spot.essid + ' · ' + spot.auth_type));
      head.appendChild(info);
      const dist = el('span', 'badge badge-ghost text-xs',
        spot.distance_km != null ? spot.distance_km.toFixed(1) + ' km' : '');
      head.appendChild(dist);
      body.appendChild(head);
      const meta = el('div', 'flex items-center gap-2 flex-wrap');
      const cardQ = qualityNode(spot);
      if (cardQ) meta.appendChild(cardQ);
      if (spot.ratings_count) {
        const rc = el('span', 'text-xs opacity-60', '(' + spot.ratings_count + ')');
        rc.dataset.testid = 'spot-ratings-count';
        meta.appendChild(rc);
      }
      const cardS = speedNode(spot);
      if (cardS) meta.appendChild(cardS);
      if (meta.children.length) body.appendChild(meta);
      const cardBadge = confirmationBadge(spot);
      if (cardBadge) body.appendChild(cardBadge);
      const actions = el('div', 'flex gap-2 flex-wrap');
      const link = el('a', 'btn btn-xs btn-outline w-fit', 'View & share');
      link.setAttribute('href', '/s/' + encodeURIComponent(spot.id));
      actions.appendChild(link);
      const rateBtn = el('button', 'btn btn-xs btn-outline btn-primary', '★ Rate');
      rateBtn.dataset.testid = 'spot-rate';
      rateBtn.addEventListener('click', () => onRate && onRate(spot));
      actions.appendChild(rateBtn);
      if (myUserId && spot.created_by === myUserId) {
        const editBtn = el('button', 'btn btn-xs btn-ghost', '✏️ Edit');
        editBtn.dataset.testid = 'spot-edit';
        editBtn.addEventListener('click', () => onEdit && onEdit(spot));
        actions.appendChild(editBtn);
      }
      body.appendChild(actions);
      li.appendChild(body);
      li.addEventListener('click', (e) => {
        if (e.target.closest('a, button')) return;
        map.flyTo([spot.lat, spot.lng], Math.max(map.getZoom(), 15));
      });
      return li;
    }

    function distKm(a, b) {
      const R = 6371;
      const dLat = (b.lat - a.lat) * Math.PI / 180;
      const dLng = (b.lng - a.lng) * Math.PI / 180;
      const la1 = a.lat * Math.PI / 180;
      const la2 = b.lat * Math.PI / 180;
      const h = Math.sin(dLat / 2) ** 2 + Math.cos(la1) * Math.cos(la2) * Math.sin(dLng / 2) ** 2;
      return 2 * R * Math.asin(Math.sqrt(h));
    }

    function parseViewFromURL() {
      const p = new URLSearchParams(window.location.search);
      const lat = parseFloat(p.get('lat'));
      const lng = parseFloat(p.get('lng'));
      const zoom = parseInt(p.get('zoom'), 10);
      if (Number.isFinite(lat) && Number.isFinite(lng) && Number.isFinite(zoom)
          && lat >= -90 && lat <= 90 && lng >= -180 && lng <= 180
          && zoom >= 0 && zoom <= 19) {
        return { lat, lng, zoom };
      }
      return null;
    }

    // Leaflet is loaded via `defer`; wait for it before initialising.
    window.addEventListener('DOMContentLoaded', () => {
      // Session storage keys — defined first so the map loaders below can read
      // the token (authed reads return viewer fields like my_rating).
      const TOKEN_KEY = 'owpm_token';
      const USER_KEY = 'owpm_user';
      const ID_KEY = 'owpm_user_id'; // owner check for the Edit button
      const getToken = () => localStorage.getItem(TOKEN_KEY);
      const getUsername = () => localStorage.getItem(USER_KEY);

      const statusEl = document.getElementById('status');
      const resultsEl = document.getElementById('results');
      const initial = parseViewFromURL();
      const map = L.map('map', { worldCopyJump: true })
        .setView(initial ? [initial.lat, initial.lng] : [20, 0], initial ? initial.zoom : 2);
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        maxZoom: 19,
        attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
      }).addTo(map);

      // Cluster dense viewports; fall back to a plain layer if the cluster
      // plugin's CDN didn't load so the map still works.
      const markerLayer = (L.markerClusterGroup
        ? L.markerClusterGroup({ maxClusterRadius: 50, showCoverageOnHover: false })
        : L.layerGroup()).addTo(map);
      let reqToken = 0;
      let currentSpots = []; // last fetched in-view set; filters apply on top
      let viewTruncated = false; // true when the page cap stopped the cursor loop

      // Quality (min stars) + speed (min ↓ Mbps) filters, read from the selects.
      const filterQualityEl = document.getElementById('filter-quality');
      const filterSpeedEl = document.getElementById('filter-speed');

      // Redraw markers + list from currentSpots through the active filters. The
      // map is a viewport, so filtering the in-view set is the right semantics.
      function renderSpots() {
        const minQ = parseInt(filterQualityEl.value, 10) || 0;
        const minDown = parseFloat(filterSpeedEl.value) || 0;
        const shown = currentSpots.filter((s) =>
          (s.quality || 0) >= minQ &&
          (minDown === 0 || (s.down_mbps != null && s.down_mbps >= minDown)));
        markerLayer.clearLayers();
        for (const s of shown) {
          L.circleMarker([s.lat, s.lng], {
            radius: 8, weight: 1.5, color: '#fff',
            fillColor: qualityColor(s.quality || 0), fillOpacity: 0.9,
          }).addTo(markerLayer).bindPopup(popupNode(s));
        }
        resultsEl.replaceChildren();
        for (const s of shown) resultsEl.appendChild(listItem(s, map));
        const more = viewTruncated ? ' — zoom in to see the rest' : '';
        if (currentSpots.length === 0) {
          statusEl.textContent = 'No spots in this area yet — add one with “➕ Add WiFi”.';
        } else if (shown.length === currentSpots.length) {
          statusEl.textContent = `${shown.length} spot(s) in view${more}`;
        } else {
          statusEl.textContent = `${shown.length} of ${currentSpots.length} spot(s) shown (filtered)${more}`;
        }
      }
      filterQualityEl.addEventListener('change', renderSpots);
      filterSpeedEl.addEventListener('change', renderSpots);

      function radiusKm() {
        const c = map.getCenter();
        const ne = map.getBounds().getNorthEast();
        // server caps area radius at 300 km; nothing smaller than 1 km
        return Math.max(1, Math.min(300, c.distanceTo(ne) / 1000));
      }

      async function loadSpots() {
        const my = ++reqToken;
        const c = map.getCenter();
        statusEl.textContent = 'Loading…';
        try {
          const r = radiusKm();
          // Authed reads also return viewer fields (my_rating) for prefills.
          const token = getToken();
          const opts = token ? { headers: { 'Authorization': 'Bearer ' + token } } : undefined;
          // /api/spots/area is cursor-paginated: follow next_cursor so a dense
          // viewport isn't silently cut off at one page. The page cap bounds a
          // pathological zoomed-out view; truncation is surfaced in the status.
          const MAX_PAGES = 5; // × 200/page = 1000 spots
          const all = [];
          let cursor = '';
          let pages = 0;
          do {
            const url = `/api/spots/area?lat=${c.lat}&lng=${c.lng}&radius_km=${r.toFixed(2)}`
              + (cursor ? `&cursor=${encodeURIComponent(cursor)}` : '');
            const res = await fetch(url, opts);
            if (my !== reqToken) return; // a newer pan/zoom superseded us
            if (!res.ok) throw new Error('server returned ' + res.status);
            const data = await res.json();
            all.push(...(data.results || []));
            cursor = data.next_cursor || '';
            pages++;
          } while (cursor && pages < MAX_PAGES);
          viewTruncated = cursor !== '';
          currentSpots = all.map(s => ({
            ...s,
            distance_km: distKm(c, { lat: s.lat, lng: s.lng }),
          })).sort((a, b) => a.distance_km - b.distance_km);
          renderSpots();
        } catch (err) {
          if (my !== reqToken) return;
          statusEl.textContent = 'Could not load spots: ' + (err && err.message ? err.message : 'unknown');
        }
      }

      function syncURL() {
        const c = map.getCenter();
        const p = new URLSearchParams(window.location.search);
        p.set('lat', c.lat.toFixed(5));
        p.set('lng', c.lng.toFixed(5));
        p.set('zoom', String(map.getZoom()));
        window.history.replaceState(null, '', window.location.pathname + '?' + p.toString());
      }

      // Debounced reload on every map move/zoom; flyTo also fires moveend.
      let moveTimer;
      map.on('moveend zoomend', () => {
        syncURL();
        clearTimeout(moveTimer);
        moveTimer = setTimeout(loadSpots, 350);
      });

      function tryGeolocate(explicit) {
        if (!navigator.geolocation) {
          if (explicit) statusEl.textContent = 'Geolocation is not supported by this browser.';
          loadSpots();
          return;
        }
        if (explicit) statusEl.textContent = 'Locating…';
        navigator.geolocation.getCurrentPosition(
          (pos) => map.flyTo([pos.coords.latitude, pos.coords.longitude], 13),
          (err) => {
            statusEl.textContent = (explicit ? 'Location unavailable: ' + err.message + ' — ' : '')
              + 'Pan the map to find WiFi, or tap 📍 to use your location.';
            if (!explicit) loadSpots();
          },
          { enableHighAccuracy: true, timeout: 8000 },
        );
      }

      document.getElementById('locate').addEventListener('click', () => tryGeolocate(true));

      // If the URL already specifies a view (shared link), honor it and skip
      // silent geolocation. Otherwise try geolocation silently; on success,
      // flyTo triggers the spot load via moveend, on failure we load the
      // default view so the user sees something rather than an empty state.
      if (initial) {
        loadSpots();
      } else {
        tryGeolocate(false);
      }

      // ---- Accounts + adding spots -------------------------------------
      // The public API is the same one the mobile app and CLI use: auth via
      // bearer token (kept in localStorage, keys defined at the top), spots
      // posted to /api/spots.
      const accountEl = document.getElementById('account');
      const authModal = document.getElementById('auth-modal');
      const addModal = document.getElementById('add-modal');
      const authError = document.getElementById('auth-error');
      const addError = document.getElementById('add-error');
      const pickBar = document.getElementById('pick-bar');
      const toastEl = document.getElementById('toast');
      const toastBody = document.getElementById('toast-body');
      const authForm = document.getElementById('auth-form');
      const addForm = document.getElementById('add-form');
      const addAuthType = document.getElementById('add-authtype');
      const addPassword = document.getElementById('add-password');
      const addQuality = document.getElementById('add-quality');
      const addDown = document.getElementById('add-down');
      const addUp = document.getElementById('add-up');
      const addPing = document.getElementById('add-ping');
      const addTitle = document.getElementById('add-title');
      const addRatingFields = document.getElementById('add-rating-fields');
      const reviewModal = document.getElementById('review-modal');
      const reviewForm = document.getElementById('review-form');
      const reviewError = document.getElementById('review-error');
      const reviewQuality = document.getElementById('review-quality');
      const reviewDown = document.getElementById('review-down');
      const reviewUp = document.getElementById('review-up');
      const reviewPing = document.getElementById('review-ping');

      myUserId = localStorage.getItem(ID_KEY);

      // Optional non-negative numbers: null (omit) when blank/invalid.
      const num = (v) => { const n = parseFloat(v); return Number.isFinite(n) && n >= 0 ? n : null; };
      const int = (v) => { const n = parseInt(v, 10); return Number.isFinite(n) && n >= 0 ? n : null; };

      function showToast(msg, kind) {
        toastBody.className = 'alert alert-' + (kind || 'success');
        toastBody.textContent = msg;
        toastEl.classList.remove('hidden');
        setTimeout(() => toastEl.classList.add('hidden'), 3000);
      }

      // Fill the account menu's "N WiFis added" line from /api/me (a real count,
      // not derived from the in-view list). Best-effort: stays "…" on failure.
      async function refreshMyStats() {
        const token = getToken();
        if (!token) return;
        try {
          const res = await fetch('/api/me', { headers: { 'Authorization': 'Bearer ' + token } });
          if (!res.ok) return;
          const data = await res.json();
          // Backfill the user id for sessions created before it was stored.
          if (data.user && data.user.id) {
            localStorage.setItem(ID_KEY, data.user.id);
            if (myUserId !== data.user.id) { myUserId = data.user.id; renderSpots(); }
          }
          const elc = document.getElementById('my-spot-count');
          if (elc) elc.textContent = data.spots_added + (data.spots_added === 1 ? ' WiFi added' : ' WiFis added');
        } catch (_) { /* leave the placeholder */ }
      }

      function renderAccount() {
        accountEl.replaceChildren();
        const user = getUsername();
        if (getToken() && user) {
          const wrap = el('div', 'dropdown dropdown-end');
          const btn = el('button', 'btn btn-sm btn-ghost', '👤 ' + user);
          btn.dataset.testid = 'account-button';
          btn.setAttribute('tabindex', '0');
          const menu = el('ul', 'dropdown-content menu bg-base-100 rounded-box shadow z-[1000] w-44 p-2');
          menu.setAttribute('tabindex', '0');
          // Count of WiFis this user added (filled in async by refreshMyStats).
          const statLi = el('li', 'menu-title');
          const stat = el('span', 'text-xs', '… WiFis added');
          stat.id = 'my-spot-count';
          stat.dataset.testid = 'my-spot-count';
          statLi.appendChild(stat);
          menu.appendChild(statLi);
          const li = el('li');
          const logout = el('a', null, 'Log out');
          logout.dataset.testid = 'logout';
          logout.addEventListener('click', doLogout);
          li.appendChild(logout);
          menu.appendChild(li);
          wrap.appendChild(btn);
          wrap.appendChild(menu);
          accountEl.appendChild(wrap);
          refreshMyStats();
        } else {
          const btn = el('button', 'btn btn-sm btn-ghost', 'Log in');
          btn.dataset.testid = 'login-button';
          btn.addEventListener('click', () => openAuth());
          accountEl.appendChild(btn);
        }
      }

      function openAuth() {
        authError.classList.add('hidden');
        authForm.reset();
        authModal.showModal();
      }

      async function submitAuth(kind) {
        authError.classList.add('hidden');
        const username = document.getElementById('auth-username').value.trim();
        const email = document.getElementById('auth-email').value.trim();
        const password = document.getElementById('auth-password').value;
        // Email is only sent (and required) when registering; login ignores it.
        const payload = kind === 'register' ? { username, email, password } : { username, password };
        try {
          const res = await fetch('/api/auth/' + kind, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload),
          });
          const data = await res.json().catch(() => ({}));
          if (!res.ok) throw new Error(data.error || ('server returned ' + res.status));
          localStorage.setItem(TOKEN_KEY, data.token);
          localStorage.setItem(USER_KEY, data.user ? data.user.username : username);
          if (data.user && data.user.id) { localStorage.setItem(ID_KEY, data.user.id); myUserId = data.user.id; }
          renderAccount();
          authModal.close();
          loadSpots(); // re-fetch with auth so my_rating + Edit buttons appear
          // If the user was mid-flow (adding or reviewing), drop them back in.
          if (pendingAdd) { pendingAdd = false; beginPlacement(); }
          else if (pendingReviewSpot) { const s = pendingReviewSpot; pendingReviewSpot = null; openReview(s); }
        } catch (err) {
          authError.textContent = err.message;
          authError.classList.remove('hidden');
        }
      }

      async function doLogout() {
        const token = getToken();
        if (token) {
          try {
            await fetch('/api/auth/logout', {
              method: 'POST',
              headers: { 'Authorization': 'Bearer ' + token },
            });
          } catch (_) { /* best-effort; clear locally regardless */ }
        }
        localStorage.removeItem(TOKEN_KEY);
        localStorage.removeItem(USER_KEY);
        localStorage.removeItem(ID_KEY);
        myUserId = null;
        renderAccount();
        renderSpots(); // drop Edit buttons
      }

      document.getElementById('auth-login').addEventListener('click', () => submitAuth('login'));
      document.getElementById('auth-register').addEventListener('click', () => submitAuth('register'));
      authForm.addEventListener('submit', (e) => { e.preventDefault(); submitAuth('login'); });
      document.getElementById('auth-cancel').addEventListener('click', () => authModal.close());
      document.getElementById('auth-forgot').addEventListener('click', submitForgot);

      // Forgot password: email the address in the form a reset magic link. The
      // server always answers 200 with a generic message (no account-enumeration).
      async function submitForgot() {
        authError.classList.add('hidden');
        const email = document.getElementById('auth-email').value.trim();
        if (!email) {
          authError.textContent = 'Enter your email above first, then tap “Forgot password?”.';
          authError.classList.remove('hidden');
          return;
        }
        try {
          const res = await fetch('/api/auth/forgot-password', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email }),
          });
          const data = await res.json().catch(() => ({}));
          if (!res.ok) throw new Error(data.error || ('server returned ' + res.status));
          authModal.close();
          showToast(data.message || 'If that email has an account, a reset link is on its way.');
        } catch (err) {
          authError.textContent = err.message;
          authError.classList.remove('hidden');
        }
      }

      // --- Placement: drop a draggable pin so the user sets the location ---
      let placingMarker = null;
      let pendingAdd = false; // set when "Add WiFi" was clicked while logged out

      function beginPlacement() {
        endPlacement();
        const c = map.getCenter();
        placingMarker = L.marker([c.lat, c.lng], { draggable: true, autoPan: true }).addTo(map);
        pickBar.classList.remove('hidden');
      }

      function endPlacement() {
        if (placingMarker) { map.removeLayer(placingMarker); placingMarker = null; }
        pickBar.classList.add('hidden');
      }

      document.getElementById('add-wifi').addEventListener('click', () => {
        if (!getToken()) { pendingAdd = true; openAuth(); return; }
        beginPlacement();
      });
      document.getElementById('pick-cancel').addEventListener('click', endPlacement);
      document.getElementById('pick-continue').addEventListener('click', () => {
        if (!placingMarker) return;
        editingSpot = null;
        const ll = placingMarker.getLatLng();
        document.getElementById('add-coords').textContent =
          'Location: ' + ll.lat.toFixed(5) + ', ' + ll.lng.toFixed(5);
        addError.classList.add('hidden');
        addForm.reset();
        addAuthType.value = 'wpa2';
        syncPasswordEnabled();
        addTitle.textContent = 'Add a WiFi spot';
        addRatingFields.classList.remove('hidden');
        addModal.showModal();
      });

      // --- Edit (own spots): same modal, prefilled, facts only — the rating
      // and speed are community data, edited via the review modal instead.
      let editingSpot = null;
      function openEdit(spot) {
        editingSpot = spot;
        addError.classList.add('hidden');
        addForm.reset();
        document.getElementById('add-venue').value = spot.venue_name || '';
        document.getElementById('add-essid').value = spot.essid || '';
        addAuthType.value = spot.auth_type || 'wpa2';
        syncPasswordEnabled();
        addPassword.value = spot.password || '';
        document.getElementById('add-notes').value = spot.notes || '';
        document.getElementById('add-coords').textContent =
          'Location: ' + spot.lat.toFixed(5) + ', ' + spot.lng.toFixed(5);
        addTitle.textContent = 'Edit WiFi spot';
        addRatingFields.classList.add('hidden');
        addModal.showModal();
      }
      onEdit = openEdit;

      // Open networks have no password — disable the field so the value is empty.
      function syncPasswordEnabled() {
        const open = addAuthType.value === 'open';
        addPassword.disabled = open;
        if (open) addPassword.value = '';
      }
      addAuthType.addEventListener('change', syncPasswordEnabled);

      async function submitSpot() {
        addError.classList.add('hidden');
        const editing = editingSpot;
        if (!editing && !placingMarker) { addModal.close(); return; }
        const ll = editing ? { lat: editing.lat, lng: editing.lng } : placingMarker.getLatLng();
        const essid = document.getElementById('add-essid').value.trim();
        if (!essid) {
          addError.textContent = 'Network name (SSID) is required.';
          addError.classList.remove('hidden');
          return;
        }
        const body = {
          venue_name: document.getElementById('add-venue').value.trim(),
          essid,
          auth_type: addAuthType.value,
          password: addPassword.value,
          notes: document.getElementById('add-notes').value.trim(),
          lat: ll.lat,
          lng: ll.lng,
        };
        if (!editing) {
          // Initial rating/speed only at creation; afterwards it's a review.
          body.quality = parseInt(addQuality.value, 10) || 0;
          body.down_mbps = num(addDown.value);
          body.up_mbps = num(addUp.value);
          body.ping_ms = int(addPing.value);
        }
        try {
          const res = await fetch(editing ? '/api/spots/' + encodeURIComponent(editing.id) : '/api/spots', {
            method: editing ? 'PUT' : 'POST',
            headers: {
              'Content-Type': 'application/json',
              'Authorization': 'Bearer ' + getToken(),
            },
            body: JSON.stringify(body),
          });
          const data = await res.json().catch(() => ({}));
          if (res.status === 401) {
            // Session expired — clear it and prompt a fresh login.
            doLogout();
            addModal.close();
            if (!editing) pendingAdd = true;
            openAuth();
            return;
          }
          if (!res.ok) throw new Error(data.error || ('server returned ' + res.status));
          addModal.close();
          if (editing) {
            editingSpot = null;
            showToast('Spot updated.');
          } else {
            endPlacement();
            showToast('WiFi spot added — thanks!');
            refreshMyStats();
          }
          loadSpots();
        } catch (err) {
          addError.textContent = err.message;
          addError.classList.remove('hidden');
        }
      }

      addForm.addEventListener('submit', (e) => { e.preventDefault(); submitSpot(); });
      document.getElementById('add-cancel').addEventListener('click', () => { addModal.close(); });
      // The pin is intentionally kept on modal close so the user can re-open and
      // adjust; endPlacement() runs only on explicit cancel or a successful save.

      // --- Reviews: any logged-in user rates / speed-tests any spot ---
      let pendingReviewSpot = null; // set when Rate was clicked while logged out
      let reviewingSpot = null;

      function openReview(spot) {
        if (!getToken()) { pendingReviewSpot = spot; openAuth(); return; }
        reviewingSpot = spot;
        reviewError.classList.add('hidden');
        reviewForm.reset();
        document.getElementById('review-target').textContent =
          (spot.venue_name || spot.essid) + ' · current: ' +
          (spot.quality ? '★'.repeat(spot.quality) : 'unrated') +
          (spot.ratings_count ? ' (' + spot.ratings_count + ' rating' + (spot.ratings_count === 1 ? '' : 's') + ')' : '');
        if (spot.my_rating) reviewQuality.value = String(spot.my_rating);
        reviewModal.showModal();
      }
      onRate = openReview;

      async function submitReview() {
        reviewError.classList.add('hidden');
        if (!reviewingSpot) { reviewModal.close(); return; }
        const body = {
          quality: reviewQuality.value ? parseInt(reviewQuality.value, 10) : null,
          down_mbps: num(reviewDown.value),
          up_mbps: num(reviewUp.value),
          ping_ms: int(reviewPing.value),
        };
        if (body.quality == null && body.down_mbps == null && body.up_mbps == null && body.ping_ms == null) {
          reviewError.textContent = 'Pick a star rating and/or enter a speed measurement.';
          reviewError.classList.remove('hidden');
          return;
        }
        try {
          const res = await fetch('/api/spots/' + encodeURIComponent(reviewingSpot.id) + '/review', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'Authorization': 'Bearer ' + getToken(),
            },
            body: JSON.stringify(body),
          });
          const data = await res.json().catch(() => ({}));
          if (res.status === 401) {
            doLogout();
            reviewModal.close();
            pendingReviewSpot = reviewingSpot;
            openAuth();
            return;
          }
          if (!res.ok) throw new Error(data.error || ('server returned ' + res.status));
          reviewModal.close();
          reviewingSpot = null;
          showToast('Thanks — review saved!');
          loadSpots();
        } catch (err) {
          reviewError.textContent = err.message;
          reviewError.classList.remove('hidden');
        }
      }

      reviewForm.addEventListener('submit', (e) => { e.preventDefault(); submitReview(); });
      document.getElementById('review-cancel').addEventListener('click', () => reviewModal.close());

      renderAccount();
    });
  })();
  </script>
</body>
</html>
