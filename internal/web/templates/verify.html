<!DOCTYPE html>
<html lang="en" data-theme="emerald">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Verify your email — OpenWifiPassMap</title>
  <meta name="robots" content="noindex" />
  <link href="/static/app.css" rel="stylesheet" type="text/css" />
</head>
<body class="bg-base-200 min-h-screen flex flex-col">
  <header class="navbar bg-base-100 shadow-sm">
    <a href="/" class="flex-1 px-4 text-xl font-bold">📶 OpenWifiPassMap</a>
  </header>

  <main class="flex-1 flex items-center justify-center p-4">
    <div class="card bg-base-100 shadow-md w-full max-w-sm">
      <div class="card-body items-center text-center">
        <input type="hidden" id="verify-token" value="{{.Token}}" />
        <p id="pending" data-testid="verify-pending" class="text-sm opacity-70">Verifying your email…</p>
        <div id="ok" data-testid="verify-ok" class="hidden">
          <div class="alert alert-success text-sm">✓ Email verified — thanks!</div>
          <a href="/" class="btn btn-primary btn-sm w-full mt-3">Back to the map</a>
        </div>
        <p id="error" data-testid="verify-error" class="text-error text-sm hidden"></p>
      </div>
    </div>
  </main>

  <script>
  (async function () {
    const token = document.getElementById('verify-token').value;
    const pending = document.getElementById('pending');
    const showError = (msg) => {
      pending.classList.add('hidden');
      const e = document.getElementById('error');
      e.textContent = msg;
      e.classList.remove('hidden');
    };
    if (!token) { showError('This verification link is missing its token.'); return; }
    try {
      const res = await fetch('/api/auth/verify-email', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token }),
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(data.error || ('server returned ' + res.status));
      pending.classList.add('hidden');
      document.getElementById('ok').classList.remove('hidden');
    } catch (err) {
      showError(err.message);
    }
  })();
  </script>
</body>
</html>
